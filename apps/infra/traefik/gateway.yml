kind:       Gateway
apiVersion: gateway.networking.k8s.io/v1

metadata:
  name:      traefik-gateway
  namespace: traefik

spec:
  gatewayClassName: traefik
  
  listeners:
    - name:     http
      protocol: HTTP
      port:     80
      allowedRoutes:
        namespaces:
          from: All   # Same, All
    
