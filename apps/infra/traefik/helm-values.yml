# +argocd:skip-file-rendering
ports:
  web:                        # HTTP entry point named 'web'
    port:     80
    nodePort: 30000
    # Instructs this entry point to redirect all traffic to the 'https' entry point
    # redirections:
    #   entryPoint:
    #     to:        websecure  # name of the entry point
    #     scheme:    https      # protocol
    #     permanent: true
  
  websecure:                  # HTTPS entry point named 'websecure'
    port:        443
    exposedPort: 443
    nodePort:    30001

api:
  dashboard: true
  insecure:  false

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.localhost`)
    entryPoints:
      - web
    # middlewares:
    #   - name: dashboard-auth

