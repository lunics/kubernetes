#     spec:
#       basicAuth:
#         secret: dashboard-auth-secret

providers:
  kubernetesGateway:
    enabled: true
    experimentalChannel: true
  kubernetesIngress:
    enabled: false

gatewayClass:
  enabled: false

gateway:
  enabled: false

ingressClass:
  enabled: false

logs:
  general:
    level:   INFO
  access:
    enabled: true
    format:  json
    fields:
      general:
        names:
          RouterName: drop

metrics:
  prometheus:
    enabled: true
