ports:
  http:
    port: 80
    expose: true
    protocol: TCP

  https:
    port: 443
    expose: true
    protocol: TCP
    tls:
      enabled: true

ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.localhost`)
    entryPoints:
      - web

providers:
  kubernetesGateway:
    enabled: true

gateway:
  listeners:
    http:
      namespacePolicy:
        from: All
    https:
      namespacePolicy:
        from: All
