ingressRoute:
  dashboard:
    enabled: true
    matchRule: Host(`traefik.localhost`)
    entryPoints:
      - http

providers:
  kubernetesGateway:
    enabled: true

gateway:
  listeners:
    http:
      namespacePolicy:
        from: All
    https:
      namespacePolicy:
        from: All
