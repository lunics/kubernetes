apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: https://helm.goharbor.io
    chart: harbor
    targetRevision: 1.3.2  # https://artifacthub.io/packages/helm/harbor/harbor
  destination:
    server: https://kubernetes.default.svc
    namespace: harbor
  helm:
    values: |
      expose:
        type: nodePort
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
