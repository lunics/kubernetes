apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: traefik
  namespace: argo-cd

spec:
  project: default

  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 30.1.0
    helm:
      values: |
        deployment:
          replicas: 2
        
        ports:
          web:
            port: 8080
            exposedPort: 80
          websecure:
            port: 8443
            exposedPort: 443
            tls:
              enabled: true
        
        ingressRoute:
          dashboard:
            enabled: true
        
        service:
          type: NodePort        # LoadBalancer, NodePort
          ports:
            web:
              nodePort: 30080
            websecure:
              nodePort: 30443
  
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
