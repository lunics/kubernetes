kind:       Application
apiVersion: argoproj.io/v1alpha1

metadata:
  name:      traefik
  namespace: argo-cd

spec:
  project: default

  source:
    repoURL: https://traefik.github.io/charts
    chart:   traefik
    targetRevision: 38.0.0
    helm:
      values: |
        entryPoints:
          web:
            address: ":80"

        ingressRoute:
          dashboard:
            enabled: true
            matchRule: Host(`traefik.localhost`)
            entryPoints:
              - web

        providers:
          kubernetesGateway:
            enabled: true

        gateway:
          listeners:
            web:
              namespacePolicy:
                from: All

        # deployment:
        #   replicas: 1

        # ports:
        #   web:
        #     port: 8080
        #     exposedPort: 80
        #   websecure:
        #     port: 8443
        #     exposedPort: 443
        #     tls:
        #       enabled: true

        # service:
        #   type: NodePort        # LoadBalancer, NodePort
        #   ports:
        #     web:
        #       nodePort: 30080
        #     websecure:
        #       nodePort: 30443
  
  destination:
    server:    https://kubernetes.default.svc
    namespace: traefik
  
  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
