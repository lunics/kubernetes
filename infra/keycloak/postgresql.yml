kind:       Cluster
apiVersion: postgresql.cnpg.io/v1

metadata:
  name:      cluster-db-keycloak
  namespace: authentication

spec:
  instances: 1
  
  primaryUpdateStrategy: unsupervised
  
  postgresql:
    parameters:
      max_connections:      "200"
      shared_buffers:       "256MB"
      effective_cache_size: "1GB"
      work_mem:             "16MB"
  
  storage:
    size: 2Gi
    # storageClass: fast-ssd  # Ajustez selon votre cluster
  
  bootstrap:
    initdb:
      database: keycloak
      owner:    keycloak
      secret:
        name: secret-keycloak-login
  
  # Backup configuration (optionnel mais recommandé)
