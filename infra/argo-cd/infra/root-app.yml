kind:       Application
apiVersion: argoproj.io/v1alpha1

metadata:
  name:      root-app
  namespace: argo-cd
  finalizers:
    # ensures that app is not deleted until it is not referenced by any application
    # to delete the resources the app manages, perform a cascading delete
    - resources-finalizer.argocd.argoproj.io      

spec:
  source:
    repoURL:        git@github.com:lunics/argo-cd.git
    targetRevision: HEAD
    path:           infra/argo-cd
    directory:
      recurse: true

  destination:
    server:    https://kubernetes.default.svc
    namespace: argo-cd

  project: default

  syncPolicy:
    automated:
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
