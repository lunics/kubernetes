kind:       Application
apiVersion: argoproj.io/v1alpha1

metadata:
  name:      root-app
  namespace: argo-cd
  finalizers:
    # ensures that app is not deleted until it is not referenced by any application
    # to delete the resources the app manages, perform a cascading delete
    - resources-finalizer.argocd.argoproj.io      

spec:
  project: default

  source:
    repoURL:        git@github.com:lunics/argo-cd.git
    path:           .
    targetRevision: HEAD
    directory:
      recurse: true

  # sources:
  #   - repoURL:        git@github.com:lunics/argo-cd.git
  #     path:           infra
  #     targetRevision: HEAD
  #     directory:
  #       recurse: true

  #   - repoURL:        git@github.com:lunics/argo-cd.git
  #     path:           apps
  #     targetRevision: HEAD
  #     directory:
  #       recurse: true

  destination:
    server:    https://kubernetes.default.svc
    namespace: argo-cd

  syncPolicy:
    automated:
      enabled:  true
      prune:    true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true     # allow changes in child apps without triggering an out-of-sync status

  # ignoreDifferences:
  #   - group: "*"
  #     kind: "Application"
  #     jsonPointers:
  #       # Allow manually disabling auto sync for apps, useful for debugging.
  #       - /spec/syncPolicy/automated
  #       # These are automatically updated on a regular basis. Not ignoring last applied configuration since it's used for computing diffs after normalization.
  #       - /metadata/annotations/argocd.argoproj.io~1refresh
  #       - /operation
