apiVersion: v1
kind: ConfigMap
metadata:
  name:      traefik-helm-values
  namespace: argo-cd
data:
  helm-values: |
    ports:
      web:
        port: 80
        expose: true

    ingressRoute:
      dashboard:
        enabled: true
        matchRule: Host(`traefik.localhost`)
        entryPoints:
          - web

    providers:
      kubernetesGateway:
        enabled: true

    gateway:
      listeners:
        web:
          namespacePolicy:
            from: All
